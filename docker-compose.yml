version: '3.8'

services:
  db:
    image: postgres:16.2
    restart: unless-stopped
    environment:
      POSTGRES_DB: storedb
      POSTGRES_USER: store
      POSTGRES_PASSWORD: storepass
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U store"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/storedb
      SPRING_DATASOURCE_USERNAME: store
      SPRING_DATASOURCE_PASSWORD: storepass
    restart: on-failure

volumes:
  db-data:

